# 유튜브 고조회수 썸네일 카피 플레이북 (경제/부동산 한국 채널 분석)
# 리치고/삼프로TV/김작가TV/부동산김사부 등 상위 영상 패턴 요약

principles:
  - name: 호기심 갭
    desc: 결과는 숨기고 긴장만. "왜 반대로?", "이상한 이유", "진짜 원인"
  - name: 역설/반전
    desc: 통념을 뒤집는 한 단어. "금리 내려도 안 올라", "공식이 깨졌다"
  - name: 숫자 앵커
    desc: 시청자 뇌에 박히는 구체 숫자. "3가지", "0.25%", "3000조", "5년 만에"
  - name: 긴급성
    desc: 지금·올해·이번달. "지금 집 사면", "이번 달부터", "2026 상반기"
  - name: 권위 선언
    desc: '결론부터, 정리했다, 가장 중요한'
  - name: 위험/손실 회피
    desc: 손실에 더 강하게 반응. "절대 놓치면 안 되는", "잃기 전에", "위험 신호"
  - name: 개인 지칭
    desc: '여러분, 당신의 집'
  - name: 대비 구조
    desc: 'A vs B — 전세 vs 월세, 서울 vs 지방'

layout_rules:
  - 총 문자 수: 6~14자 (2줄 기준 합계)
  - 한 줄 최대: 10자 (한글 기준)
  - 강조어: 1개만 포인트 컬러
  - 금지: 물음표·느낌표 3개 이상 연속, 이모지
  - 권장: 줄바꿈은 의미 단위로 (주어/서술 분리)

high_impact_templates:
  - "{숫자} {명사}, {역설 선언}"           # 예: 3가지 신호, 집값 공식 깨졌다
  - "{주제}, {권위 선언}"                   # 예: 금리와 집값, 결론부터 말합니다
  - "{부정 단어} {명사}"                    # 예: 위험 신호 / 공식 파괴
  - "{질문형} {호기심 갭}"                   # 예: 왜 금리 내려도 안 올라?
  - "{A} vs {B}"                            # 예: 전세 vs 월세
  - "{긴급} {상황}"                          # 예: 지금 집 사면
  - "{숫자} {시간} {변화}"                   # 예: 5년 만에 처음

accent_word_rules:
  - 실제 문구 안의 단어여야 함
  - 명사 > 동사 > 형용사 순으로 고름
  - 숫자/퍼센트/부정어/역설어 우선
  - 조사/접속사는 강조 금지

forbidden:
  - 과장 (역대급, 충격, 미쳤다)
  - 공포 조장 (망한다, 폭락, 대참사)
  - 어그로성 단정 (무조건, 100%)
  - 근거 없는 예언 (10월에 폭등)
